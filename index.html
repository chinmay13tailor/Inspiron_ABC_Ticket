<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Customer Ticket Dashboard</title>

<style>
body{
font-family:Segoe UI;
background:#f1f5f9;
margin:0;
padding:10px;
}

/* KPI */
.kpi{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
margin-bottom:10px;
}
.kpi div{
background:white;
padding:10px;
border-radius:10px;
text-align:center;
font-weight:600;
}

/* LAYOUT */
.container{
display:grid;
grid-template-columns:35% 65%;
gap:10px;
height:85vh;
}
.ticketList::-webkit-scrollbar {
width:6px;
}
.ticketList::-webkit-scrollbar-thumb {
background:#cbd5f5;
border-radius:10px;
}

/* LEFT PANEL */
.left{
background:white;
border-radius:12px;
padding:10px;
display:flex;
flex-direction:column;
height:100%;          
overflow:hidden;    
}

.ticketHeader{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

.ticketList{
flex:1;
overflow-y:auto;
padding-right:3px;
}

.empty{
text-align:center;
color:#888;
margin-top:50px;
}

.ticket{
padding:10px;
border-radius:8px;
margin-bottom:8px;
cursor:pointer;
border:1px solid #eee;
}

.ticket:hover{
background:#f1f5f9;
}
.ticket.active{
border-left:4px solid #2563eb;
background:#f8fafc;
}
.ticketHeader select{
width:auto;
padding:6px;
font-size:12px;
}

/* RIGHT PANEL */
.right{
background:white;
border-radius:12px;
display:flex;
flex-direction:column;
}

.details{
padding:10px;
border-bottom:1px solid #eee;
}

.chat{
flex:1;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
}

.msg{
padding:8px;
margin:5px;
border-radius:8px;
max-width:70%;
}

.customer{background:#dbeafe;}
.oem{background:#dcfce7;align-self:flex-end;}

.inputBox{
display:flex;
padding:10px;
border-top:1px solid #eee;
}

input,select,textarea{
width:100%;
padding:8px;
margin-bottom:8px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:8px 12px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

/* POPUP */
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center;
}

.popupContent{
background:white;
padding:20px;
border-radius:12px;
width:300px;
}
  .details{
padding:12px;
border-bottom:1px solid #eee;
}

.ticketTitle{
font-size:16px;
font-weight:600;
margin-bottom:6px;
}

.badge{
font-size:11px;
padding:3px 8px;
border-radius:6px;
margin-left:8px;
}

.sectionRow{
display:flex;
justify-content:space-between;
margin-top:8px;
font-size:13px;
}

.label{
color:#777;
font-size:12px;
}

.value{
font-weight:500;
}

.descBox{
background:#f1f5f9;
padding:8px;
border-radius:6px;
margin-top:8px;
font-size:13px;
}
</style>
</head>

<body>

<!-- KPI -->
<div class="kpi">
<div id="all">0<br>All</div>
<div id="open">0<br>Open</div>
<div id="progress">0<br>In Progress</div>
<div id="resolved">0<br>Resolved</div>
<div id="closed">0<br>Closed</div>
</div>

<div class="container">

<!-- LEFT -->
<div class="left">

<div class="ticketHeader">

<h3>Tickets</h3>

<div style="display:flex; gap:8px; align-items:center;">

<select id="priorityFilter" onchange="applyFilters()">
<option value="ALL">All Priority</option>
<option value="LOW">LOW</option>
<option value="MEDIUM">MEDIUM</option>
<option value="HIGH">HIGH</option>
</select>

<button onclick="openPopup()">+ Create</button>

</div>

</div>

<div id="ticketList" class="ticketList"></div>

</div>

<!-- RIGHT -->
<div class="right">

<!-- 🔷 TICKET DETAILS -->
<div class="details" id="details"></div>

<!-- 🔷 CHAT -->
<div class="chat" id="chat"></div>

<!-- 🔷 INPUT -->
<div class="inputBox">
<input id="chatInput" placeholder="Add a comment...">
<button onclick="sendChatUI()">Send</button>
</div>

</div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popupContent">

<h3>Create Ticket</h3>

<select id="machine">
<option>MC_01</option>
<option>MC_02</option>
<option>MC_03</option>
</select>

<input id="subject" placeholder="Subject">
<textarea id="desc"></textarea>

<select id="priority">
<option>LOW</option>
<option>MEDIUM</option>
<option>HIGH</option>
</select>

<button onclick="createTicket()">Create</button>
<button onclick="closePopup()">Cancel</button>

</div>
</div>

<!-- ONLY SCRIPT PART UPDATED -->
<script>

const API="https://plantwiz.pimateck.in/api";
const DEVICE_ID="2b113dd0-2ce1-11f1-91db-cbfa9ac9843b";
const JWT=new URLSearchParams(location.search).get("token")||"";

let selectedTicket=null;
let fullTicketList = [];

// POPUP
function openPopup(){popup.style.display="flex";}
function closePopup(){popup.style.display="none";}

// CREATE
async function createTicket(){

const num="ABC-"+Date.now();
const ts = Date.now();

await fetch(`${API}/plugins/telemetry/DEVICE/${DEVICE_ID}/timeseries/ANY`,{
method:"POST",
headers:{
"X-Authorization":"Bearer "+JWT,
"Content-Type":"application/json"
},
body:JSON.stringify([{
ts:ts,
values:{
ticket_number:num,
ticket_subject:subject.value,
ticket_description:desc.value,
ticket_machine:machine.value,
ticket_customer:"ABC",
ticket_status:"OPEN",
ticket_criticality:priority.value
}
}])
});

closePopup();
loadTickets();
}

// ================= LOAD TICKETS =================
async function loadTickets(){

const res = await fetch(
`${API}/plugins/telemetry/DEVICE/${DEVICE_ID}/values/timeseries?keys=ticket_number,ticket_subject,ticket_status,ticket_customer,ticket_machine,ticket_assign_to,ticket_criticality,ticket_description&startTs=0&endTs=${Date.now()}&limit=10000&agg=NONE`,
{
headers:{"X-Authorization":"Bearer "+JWT}
});

const data = await res.json();

// STEP 1
const ticketMap = {};

(data.ticket_number || []).forEach(p => {

  if(!ticketMap[p.value]){
    ticketMap[p.value] = {
      ticket_number: p.value,
      ts: p.ts
    };
  } 
  else if(p.ts > ticketMap[p.value].ts){
    ticketMap[p.value].ts = p.ts;
  }

});

// STEP 2
["ticket_subject","ticket_status","ticket_customer","ticket_machine","ticket_assign_to","ticket_criticality","ticket_description"].forEach(key=>{
  (data[key] || []).forEach(p => {

    const match = (data.ticket_number || []).find(tn => 
      Math.abs(tn.ts - p.ts) < 10000
    );

    if(match && ticketMap[match.value]){
      ticketMap[match.value][key] = p.value;
    }

  });
});

// STORE
fullTicketList = Object.values(ticketMap);
fullTicketList = fullTicketList.filter(t => t.ticket_customer === "ABC");

// APPLY FILTER
applyFilters();
}

// ================= FILTER =================
function applyFilters(){

const priority = document.getElementById("priorityFilter")?.value || "ALL";

let list = [...fullTicketList];

if(priority !== "ALL"){
  list = list.filter(t => t.ticket_criticality === priority);
}

list.sort((a,b)=> b.ts - a.ts);

ticketList.innerHTML="";

if(list.length===0){
ticketList.innerHTML="<div class='empty'>No Tickets</div>";
updateKPI(list);
return;
}

list.forEach(t=>{

const priority = t.ticket_criticality || "LOW";
const status = t.ticket_status || "OPEN";

let priorityColor = "#3b82f6";
if(priority==="HIGH") priorityColor="#ef4444";
if(priority==="MEDIUM") priorityColor="#f59e0b";

let statusColor = "#ef4444";
if(status==="ASSIGNED") statusColor="#f59e0b";
if(status==="IN_PROGRESS") statusColor="#3b82f6";
if(status==="RESOLVED") statusColor="#22c55e";

ticketList.innerHTML+=`
<div class="ticket" onclick="selectTicket('${t.ticket_number}', event)">

<div style="display:flex; justify-content:space-between;">
<div>
<b>${t.ticket_number}</b>
<span style="
margin-left:8px;
font-size:11px;
padding:3px 8px;
border-radius:999px;
background:${priorityColor}20;
color:${priorityColor};
font-weight:600;
">
${priority}
</span>
</div>

<div style="
font-size:11px;
padding:3px 8px;
border-radius:999px;
background:${statusColor}20;
color:${statusColor};
font-weight:600;
">
${status.replace("_"," ")}
</div>
</div>

<div>${t.ticket_subject || "-"}</div>

<div style="font-size:12px; color:#666;">
${t.ticket_machine || "-"} | ${t.ticket_customer || "-"}
</div>

<div style="font-size:12px; color:#2563eb;">
👤 ${t.ticket_assign_to || "Unassigned"}
</div>

</div>
`;
});

updateKPI(list);
}

// ================= KPI =================
function updateKPI(list){

all.innerText=list.length;
open.innerText=list.filter(t=>t.ticket_status==="OPEN").length;
progress.innerText=list.filter(t=>t.ticket_status==="IN_PROGRESS").length;
resolved.innerText=list.filter(t=>t.ticket_status==="RESOLVED").length;
closed.innerText=list.filter(t=>t.ticket_status==="CLOSED").length;

}

// ================= SELECT =================
  function getPriorityColor(p){
if(p==="HIGH") return "#ef4444";
if(p==="MEDIUM") return "#f59e0b";
return "#3b82f6";
}

function getStatusColor(s){
if(s==="ASSIGNED") return "#f59e0b";
if(s==="IN_PROGRESS") return "#3b82f6";
if(s==="RESOLVED") return "#22c55e";
return "#ef4444";
}
function selectTicket(num, event){

selectedTicket = num;

// 🔥 FIND FULL DATA
const t = fullTicketList.find(x => x.ticket_number === num);

// 🔥 RENDER DETAILS
details.innerHTML = `
<div style="padding:16px; max-width:900px;">

<!-- HEADER -->
<div style="display:flex; align-items:center; gap:10px;">

  <div style="font-size:18px; font-weight:600;">
    ${t.ticket_number}
  </div>

  <span style="
    font-size:11px;
    padding:3px 8px;
    border-radius:999px;
    background:${getPriorityColor(t.ticket_criticality)}20;
    color:${getPriorityColor(t.ticket_criticality)};
    font-weight:600;
  ">
    ${t.ticket_criticality || "LOW"}
  </span>

  <span style="
    font-size:11px;
    padding:3px 8px;
    border-radius:999px;
    background:${getStatusColor(t.ticket_status)}20;
    color:${getStatusColor(t.ticket_status)};
    font-weight:600;
  ">
    ${(t.ticket_status || "OPEN").replace("_"," ")}
  </span>

</div>

<!-- SUBJECT -->
<div style="margin-top:8px; font-size:15px; font-weight:600;">
  ${t.ticket_subject || "-"}
</div>

<!-- MAIN GRID (IMPORTANT CHANGE) -->
<div style="
display:grid;
grid-template-columns:1fr 1.3fr;
gap:30px;
margin-top:20px;
">

  <!-- LEFT SIDE (INFO) -->
  <div>

    <div style="margin-bottom:14px;">
      <div style="font-size:12px; color:#777;">Machine</div>
      <div style="font-weight:600;">${t.ticket_machine || "-"}</div>
    </div>

    <div style="margin-bottom:14px;">
      <div style="font-size:12px; color:#777;">Customer</div>
      <div style="font-weight:600;">${t.ticket_customer || "-"}</div>
    </div>

    <div style="margin-bottom:14px;">
      <div style="font-size:12px; color:#777;">Created</div>
      <div style="font-weight:600;">
        ${new Date(t.ts).toLocaleString()}
      </div>
    </div>

    <div>
      <div style="font-size:12px; color:#777;">Assigned To</div>
      <div style="font-weight:600;">
        👤 ${t.ticket_assign_to || "Unassigned"}
      </div>
    </div>

  </div>

  <!-- RIGHT SIDE (DESCRIPTION) -->
  <div>

    <div style="font-size:12px; color:#777;">Issue Description</div>

    <div style="
      background:#f1f5f9;
      padding:14px;
      border-radius:10px;
      margin-top:6px;
      min-height:120px;
      line-height:1.5;
    ">
      ${t.ticket_description || "No description"}
    </div>

  </div>

</div>

</div>
`;
loadChat(num);

// ACTIVE UI
document.querySelectorAll('.ticket').forEach(el=>{
  el.classList.remove('active');
});

if(event && event.currentTarget){
  event.currentTarget.classList.add('active');
}

}

// ================= CHAT =================
async function loadChat(num){

const res=await fetch(
`${API}/plugins/telemetry/DEVICE/${DEVICE_ID}/values/timeseries?keys=chat_message,chat_sender_type,chat_sender_name,chat_number,chat_time&startTs=0&endTs=${Date.now()}&limit=10000&agg=NONE`,
{
headers:{"X-Authorization":"Bearer "+JWT}
});

const data=await res.json();

const rows={};

Object.entries(data).forEach(([k,arr])=>{
(arr||[]).forEach(p=>{
rows[p.ts]=rows[p.ts]||{};
rows[p.ts][k]=p.value;
});
});

const chats = Object.values(rows).filter(
  r => r.chat_number === num && r.chat_message
);

chats.sort((a,b)=> (a.chat_time||0) - (b.chat_time||0));

chat.innerHTML="";

chats.forEach(c=>{
chat.innerHTML+=`
<div class="msg ${c.chat_sender_type==="OEM"?"oem":"customer"}">
<b>${c.chat_sender_name}</b><br>
${c.chat_message}
</div>
`;
});

}

// ================= SEND =================
async function sendChatUI(){

await fetch(`${API}/plugins/telemetry/DEVICE/${DEVICE_ID}/timeseries/ANY`,{
method:"POST",
headers:{
"X-Authorization":"Bearer "+JWT,
"Content-Type":"application/json"
},
body:JSON.stringify([{
ts:Date.now(),
values:{
chat_number:selectedTicket,
chat_sender_type:"CUSTOMER",
chat_sender_name:"ABC User",
chat_message:chatInput.value,
chat_time: Date.now()
}
}])
});

chatInput.value="";
loadChat(selectedTicket);
}

// INIT
loadTickets();

</script>
</body>
</html>
