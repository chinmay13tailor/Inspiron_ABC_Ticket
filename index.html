<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Customer Ticket Dashboard</title>

<style>
body{
font-family:Segoe UI;
background:#f1f5f9;
margin:0;
padding:10px;
}

/* KPI */
.kpi{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
margin-bottom:10px;
}
.kpi div{
background:white;
padding:10px;
border-radius:10px;
text-align:center;
font-weight:600;
}

/* LAYOUT */
.container{
display:grid;
grid-template-columns:35% 65%;
gap:10px;
height:85vh;
}

/* LEFT PANEL */
.left{
background:white;
border-radius:12px;
padding:10px;
display:flex;
flex-direction:column;
}

.ticketHeader{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

.ticketList{
flex:1;
overflow-y:auto;
}

.empty{
text-align:center;
color:#888;
margin-top:50px;
}

.ticket{
padding:10px;
border-radius:8px;
margin-bottom:8px;
cursor:pointer;
border:1px solid #eee;
}

.ticket:hover{
background:#f1f5f9;
}

/* RIGHT PANEL */
.right{
background:white;
border-radius:12px;
display:flex;
flex-direction:column;
}

.details{
padding:10px;
border-bottom:1px solid #eee;
}

.chat{
flex:1;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
}

.msg{
padding:8px;
margin:5px;
border-radius:8px;
max-width:70%;
}

.customer{background:#dbeafe;}
.oem{background:#dcfce7;align-self:flex-end;}

.inputBox{
display:flex;
padding:10px;
border-top:1px solid #eee;
}

input,select,textarea{
width:100%;
padding:8px;
margin-bottom:8px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:8px 12px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

/* POPUP */
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center;
}

.popupContent{
background:white;
padding:20px;
border-radius:12px;
width:300px;
}
</style>
</head>

<body>

<!-- KPI -->
<div class="kpi">
<div id="all">0<br>All</div>
<div id="open">0<br>Open</div>
<div id="progress">0<br>In Progress</div>
<div id="resolved">0<br>Resolved</div>
<div id="closed">0<br>Closed</div>
</div>

<div class="container">

<!-- LEFT -->
<div class="left">

<div class="ticketHeader">
<h3>Tickets</h3>
<button onclick="openPopup()">+ Create</button>
</div>

<div id="ticketList" class="ticketList"></div>

</div>

<!-- RIGHT -->
<div class="right">

<div class="details" id="details">Select Ticket</div>

<div class="chat" id="chat"></div>

<div class="inputBox">
<input id="chatInput">
<button onclick="sendChatUI()">Send</button>
</div>

</div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popupContent">

<h3>Create Ticket</h3>

<select id="machine">
<option>MC_01</option>
<option>MC_02</option>
<option>MC_03</option>
</select>

<input id="subject" placeholder="Subject">
<textarea id="desc"></textarea>

<select id="priority">
<option>LOW</option>
<option>MEDIUM</option>
<option>HIGH</option>
</select>

<button onclick="createTicket()">Create</button>
<button onclick="closePopup()">Cancel</button>

</div>
</div>

<!-- ONLY SCRIPT PART UPDATED -->
<script>

const API="https://plantwiz.pimateck.in/api";
const DEVICE_ID="2b113dd0-2ce1-11f1-91db-cbfa9ac9843b";
const JWT=new URLSearchParams(location.search).get("token")||"";

let selectedTicket=null;

// POPUP
function openPopup(){popup.style.display="flex";}
function closePopup(){popup.style.display="none";}

// CREATE
async function createTicket(){

const num="ABC-"+Date.now();
const ts = Date.now(); // ✅ SAME TS

await fetch(`${API}/plugins/telemetry/DEVICE/${DEVICE_ID}/timeseries/ANY`,{
method:"POST",
headers:{
"X-Authorization":"Bearer "+JWT,
"Content-Type":"application/json"
},
body:JSON.stringify([{
ts:ts,
values:{
ticket_number:num,
ticket_subject:subject.value,
ticket_description:desc.value,
ticket_machine:machine.value,
ticket_customer:"ABC",
ticket_status:"OPEN",
ticket_criticality:priority.value
}
}])
});

closePopup();
loadTickets();

}

async function loadTickets(){

const res = await fetch(
`${API}/plugins/telemetry/DEVICE/${DEVICE_ID}/values/timeseries?keys=ticket_number,ticket_subject,ticket_status,ticket_customer&startTs=0&endTs=${Date.now()}&limit=10000&agg=NONE`,
{
headers:{"X-Authorization":"Bearer "+JWT}
});

const data = await res.json();

// 🔥 STEP 1: BUILD TICKET MAP
const ticketMap = {};

(data.ticket_number || []).forEach(p => {

  if(!ticketMap[p.value]){
    ticketMap[p.value] = {
      ticket_number: p.value,
      ts: p.ts
    };
  } 
  else if(p.ts > ticketMap[p.value].ts){
    ticketMap[p.value].ts = p.ts;
  }

});

// 🔥 STEP 2: ATTACH ALL FIELDS
["ticket_subject","ticket_status","ticket_customer"].forEach(key=>{
  (data[key] || []).forEach(p => {

    const match = (data.ticket_number || []).find(tn => 
      Math.abs(tn.ts - p.ts) < 10000
    );

    if(match && ticketMap[match.value]){
      ticketMap[match.value][key] = p.value;
    }

  });
});

let list = Object.values(ticketMap);

// 🔥 STEP 3: FILTER ABC (FINAL LEVEL FILTER ✔)
list = list.filter(t => t.ticket_customer === "ABC");

// 🔥 STEP 4: SORT
list.sort((a,b)=> b.ts - a.ts);

// 🔥 RENDER
ticketList.innerHTML="";

if(list.length===0){
ticketList.innerHTML="<div class='empty'>No Tickets</div>";
return;
}

list.forEach(t=>{
ticketList.innerHTML+=`
<div class="ticket" onclick="selectTicket('${t.ticket_number}')">
<b>${t.ticket_number}</b><br>
${t.ticket_subject || "-"}<br>
${t.ticket_status || "-"}
</div>
`;
});
updateKPI(list);
}

// KPI
function updateKPI(list){

all.innerText=list.length;

open.innerText=list.filter(t=>t.ticket_status==="OPEN").length;
progress.innerText=list.filter(t=>t.ticket_status==="IN_PROGRESS").length;
resolved.innerText=list.filter(t=>t.ticket_status==="RESOLVED").length;
closed.innerText=list.filter(t=>t.ticket_status==="CLOSED").length;

}

// SELECT
function selectTicket(num){
selectedTicket=num;
details.innerText=num;
loadChat(num);
}

// CHAT
async function loadChat(num){

const res=await fetch(
`${API}/plugins/telemetry/DEVICE/${DEVICE_ID}/values/timeseries?keys=chat_message,chat_sender_type,chat_sender_name,chat_number,chat_time&startTs=0&endTs=${Date.now()}&limit=10000&agg=NONE`,
{
headers:{"X-Authorization":"Bearer "+JWT}
});

const data=await res.json();

const rows={};

Object.entries(data).forEach(([k,arr])=>{
(arr||[]).forEach(p=>{
rows[p.ts]=rows[p.ts]||{};
rows[p.ts][k]=p.value;
});
});

const chats = Object.values(rows).filter(
  r => r.chat_number === num && r.chat_message
);

// ✅ FIX SORT
chats.sort((a,b)=> (a.chat_time||0) - (b.chat_time||0));

chat.innerHTML="";

chats.forEach(c=>{
chat.innerHTML+=`
<div class="msg ${c.chat_sender_type==="OEM"?"oem":"customer"}">
<b>${c.chat_sender_name}</b><br>
${c.chat_message}
</div>
`;
});

}

// SEND CHAT
async function sendChatUI(){

await fetch(`${API}/plugins/telemetry/DEVICE/${DEVICE_ID}/timeseries/ANY`,{
method:"POST",
headers:{
"X-Authorization":"Bearer "+JWT,
"Content-Type":"application/json"
},
body:JSON.stringify([{
ts:Date.now(),
values:{
chat_number:selectedTicket,
chat_sender_type:"CUSTOMER",
chat_sender_name:"ABC User",
chat_message:chatInput.value,
chat_time: Date.now() // ✅ IMPORTANT FIX
}
}])
});

chatInput.value="";
loadChat(selectedTicket);

}

// INIT
loadTickets();

</script>

</body>
</html>
