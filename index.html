<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ticket Dashboard</title>

<style>
body{
font-family:Segoe UI;
background:#eef2f7;
margin:0;
padding:10px;
}

.container{
display:grid;
grid-template-columns:30% 70%;
gap:12px;
height:95vh;
}

/* LEFT PANEL */

.left{
background:white;
border-radius:12px;
padding:15px;
overflow-y:auto;
}

.ticket{
padding:10px;
border:1px solid #ddd;
border-radius:8px;
margin-bottom:8px;
cursor:pointer;
}

.ticket:hover{
background:#f1f5f9;
}

.status{
font-size:11px;
padding:2px 6px;
border-radius:6px;
color:white;
}

.OPEN{background:#3b82f6;}
.IN_PROGRESS{background:#f59e0b;}
.RESOLVED{background:#22c55e;}
.CLOSED{background:#64748b;}

/* RIGHT PANEL */

.right{
background:white;
border-radius:12px;
display:flex;
flex-direction:column;
}

.header{
padding:12px;
border-bottom:1px solid #eee;
font-weight:600;
}

.details{
padding:10px;
font-size:14px;
border-bottom:1px solid #eee;
}

/* CHAT */

.chat{
flex:1;
overflow-y:auto;
padding:10px;
}

.msg{
margin:6px 0;
padding:8px;
border-radius:8px;
max-width:70%;
}

.customer{
background:#dbeafe;
align-self:flex-start;
}

.oem{
background:#dcfce7;
align-self:flex-end;
}

/* INPUT */

.inputBox{
display:flex;
padding:10px;
border-top:1px solid #eee;
}

input, textarea, select{
width:100%;
margin-bottom:6px;
padding:8px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.createForm{
margin-bottom:15px;
border-bottom:1px solid #ddd;
padding-bottom:10px;
}
</style>
</head>

<body>

<div class="container">

<!-- LEFT PANEL -->
<div class="left">

<div class="createForm">

<h3>Create Ticket</h3>

<input id="machine" placeholder="Machine">
<input id="subject" placeholder="Subject">
<textarea id="description" placeholder="Description"></textarea>

<select id="priority">
<option>LOW</option>
<option>MEDIUM</option>
<option>HIGH</option>
</select>

<input id="customer" placeholder="Customer Name">
<input id="username" placeholder="Your Name">

<button onclick="createTicketUI()">Create Ticket</button>

</div>

<div id="ticketList"></div>

</div>

<!-- RIGHT PANEL -->
<div class="right">

<div class="header" id="ticketHeader">Select Ticket</div>

<div class="details" id="ticketDetails"></div>

<div class="chat" id="chatBox"></div>

<div class="inputBox">
<input id="chatInput" placeholder="Type message">
<button onclick="sendChatUI()">Send</button>
</div>

</div>

</div>

<script>

// CONFIG
const API="https://plantwiz.pimateck.in/api";
const DEVICE_ID="2b113dd0-2ce1-11f1-91db-cbfa9ac9843b";
const JWT=new URLSearchParams(location.search).get("token")||"";

let selectedTicket=null;
let selectedTs=null;

// CREATE TICKET
async function createTicketUI(){

const data={
ticket_number:"TKT-"+Date.now(),
ticket_subject:subject.value,
ticket_description:description.value,
ticket_machine:machine.value,
ticket_customer:customer.value,
ticket_criticality:priority.value,
sender_name:username.value
};

await createTicket(data);
loadTickets();

}

// API CREATE
async function createTicket(data){

const ts=Date.now();

await fetch(`${API}/plugins/telemetry/DEVICE/${DEVICE_ID}/timeseries/ANY`,{
method:"POST",
headers:{
"X-Authorization":"Bearer "+JWT,
"Content-Type":"application/json"
},
body:JSON.stringify([{
ts:ts,
values:{
ticket_number:data.ticket_number,
ticket_subject:data.ticket_subject,
ticket_description:data.ticket_description,
ticket_machine:data.ticket_machine,
ticket_customer:data.ticket_customer,
ticket_assign_to:"",
ticket_criticality:data.ticket_criticality,
ticket_status:"OPEN",
ticket_created_time:ts
}
}])
});

await sendChat({
ticket_number:data.ticket_number,
sender_type:"CUSTOMER",
sender_name:data.sender_name,
message:"Ticket Created"
});

}

// SEND CHAT
async function sendChat(data){

await fetch(`${API}/plugins/telemetry/DEVICE/${DEVICE_ID}/timeseries/ANY`,{
method:"POST",
headers:{
"X-Authorization":"Bearer "+JWT,
"Content-Type":"application/json"
},
body:JSON.stringify([{
ts:Date.now(),
values:{
ticket_number:data.ticket_number,
chat_sender_type:data.sender_type,
chat_sender_name:data.sender_name,
chat_message:data.message,
chat_time:Date.now()
}
}])
});

loadChat(selectedTicket);

}

// FETCH TICKETS
async function loadTickets(){

const keys=[
"ticket_number",
"ticket_subject",
"ticket_status",
"ticket_machine"
];

const res=await fetch(`${API}/plugins/telemetry/DEVICE/${DEVICE_ID}/values/timeseries?keys=${keys.join(",")}&limit=5000`,{
headers:{"X-Authorization":"Bearer "+JWT}
});

const data=await res.json();

const rows={};

Object.entries(data).forEach(([k,arr])=>{
(arr||[]).forEach(p=>{
rows[p.ts]=rows[p.ts]||{ts:p.ts};
rows[p.ts][k]=p.value;
});
});

const list=Object.values(rows);

ticketList.innerHTML="";

list.forEach(t=>{
ticketList.innerHTML+=`
<div class="ticket" onclick="selectTicket('${t.ticket_number}','${t.ts}')">
<b>${t.ticket_number}</b><br>
${t.ticket_subject}<br>
<span class="status ${t.ticket_status}">${t.ticket_status}</span>
</div>
`;
});

}

// SELECT TICKET
function selectTicket(num,ts){
selectedTicket=num;
selectedTs=ts;

ticketHeader.innerText=num;

loadChat(num);
}

// LOAD CHAT
async function loadChat(ticket_number){

const keys=[
"ticket_number",
"chat_sender_type",
"chat_sender_name",
"chat_message"
];

const res=await fetch(`${API}/plugins/telemetry/DEVICE/${DEVICE_ID}/values/timeseries?keys=${keys.join(",")}&limit=5000`,{
headers:{"X-Authorization":"Bearer "+JWT}
});

const data=await res.json();

const rows={};

Object.entries(data).forEach(([k,arr])=>{
(arr||[]).forEach(p=>{
rows[p.ts]=rows[p.ts]||{};
rows[p.ts][k]=p.value;
});
});

const chats=Object.values(rows).filter(r=>r.ticket_number===ticket_number && r.chat_message);

chatBox.innerHTML="";

chats.forEach(c=>{
chatBox.innerHTML+=`
<div class="msg ${c.chat_sender_type==="OEM"?"oem":"customer"}">
<b>${c.chat_sender_name}</b><br>
${c.chat_message}
</div>
`;
});

}

// SEND CHAT UI
function sendChatUI(){

sendChat({
ticket_number:selectedTicket,
sender_type:"CUSTOMER",
sender_name:username.value,
message:chatInput.value
});

chatInput.value="";
}

// INIT
loadTickets();

</script>

</body>
</html>
