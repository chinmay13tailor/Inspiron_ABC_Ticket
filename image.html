<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Firebase Image Upload + ThingsBoard</title>

<style>
body{
font-family:Segoe UI;
background:#f1f5f9;
padding:20px;
}

.container{
background:white;
padding:20px;
border-radius:12px;
max-width:600px;
margin:auto;
}

img{
max-width:200px;
border-radius:8px;
margin-top:10px;
display:block;
}

button{
padding:8px 12px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
margin-right:5px;
}
</style>
</head>

<body>

<div class="container">

<h3>📸 Firebase Image Upload Test</h3>
  <div style="display:flex; gap:10px; margin-bottom:15px;">
  
  <button id="imgTab" onclick="showGalleryTab('image')" style="background:#2563eb;">Images</button>
  
  <button id="pdfTab" onclick="showGalleryTab('pdf')" style="background:#e5e7eb; color:black;">Files</button>

</div>

<input type="file" id="fileInput" accept="image/*,.pdf"><br><br>

<button onclick="uploadImage()">Upload</button>
<button onclick="loadImages()">Load Images</button>

<hr>

<div id="output"></div>

</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

<script>

// ================= CONFIG =================
const firebaseConfig = {
  apiKey: "AIzaSyCGEVEZmCkPS8uVfIrqQsNABeS1tnM59GQ",
  authDomain: "plantwiz-a9472.firebaseapp.com",
  projectId: "plantwiz-a9472",
  storageBucket: "plantwiz-a9472.firebasestorage.app",
  messagingSenderId: "197646308805",
  appId: "1:197646308805:web:0938e0acc9124c091ce7ac"
};

firebase.initializeApp(firebaseConfig);
const storage = firebase.storage();

// ================= THINGSBOARD CONFIG =================
const API = "https://plantwiz.pimateck.in/api";
const DEVICE_ID = "2b113dd0-2ce1-11f1-91db-cbfa9ac9843b";

// ✅ JWT auto from URL (NO PROMPT)
const JWT = new URLSearchParams(window.location.search).get("token");
console.log("JWT AUTO:", JWT);
const params = new URLSearchParams(window.location.search);
const ticketNumber = params.get("ticket");

console.log("TICKET:", ticketNumber);
let currentTab = "image";
// ================= UPLOAD =================
async function uploadImage(){

const file = document.getElementById("fileInput").files[0];

if(!file){
  alert("Select file first");
  return;
}

const isPDF = file.type === "application/pdf" || file.name.toLowerCase().endsWith(".pdf");
const fileName = Date.now() + "_" + file.name;
const storageRef = storage.ref("tickets/" + fileName);

try {

// upload
await storageRef.put(file);

// get URL
const url = await storageRef.getDownloadURL();
const ts = Date.now();

console.log("IMAGE URL:", url);

// send to TB
  // ===== CREATE PAYLOAD =====
const payload = {
  ts: ts,
  values: {}
};

if(isPDF){
  payload.values["pdf"] = url;
  payload.values["pdf_number"] = ticketNumber;
}else{
  payload.values["image"] = url;
  payload.values["image_number"] = ticketNumber;
}

// ===== SEND TO THINGSBOARD =====
const res = await fetch(`${API}/plugins/telemetry/DEVICE/${DEVICE_ID}/timeseries/ANY`,{
  method:"POST",
  headers:{
    "X-Authorization":"Bearer " + JWT,
    "Content-Type":"application/json"
  },
  body: JSON.stringify([payload])
});


// status check
console.log("STATUS:", res.status);

// ❌ DON'T use res.json()
const text = await res.text();
console.log("RAW RESPONSE:", text);

if(!res.ok){
  alert("❌ Telemetry failed");
  return;
}

console.log("✅ Image Saved");
alert("✅ Uploaded + Saved");

loadImages();

} catch(err){
console.error("❌ ERROR:", err);
alert("Upload failed");
}

}

// ================= LOAD =================
async function loadImages(){

try {

const res = await fetch(
`${API}/plugins/telemetry/DEVICE/${DEVICE_ID}/values/timeseries?keys=image,pdf&limit=20&agg=NONE`,
{
headers:{
"X-Authorization":"Bearer " + JWT
}
});

console.log("LOAD STATUS:", res.status);

const text = await res.text();
console.log("LOAD RAW:", text);

let data = {};
try{
  data = JSON.parse(text);
}catch(e){
  console.warn("Not JSON response");
}

// ✅ RESET + GRID START
output.innerHTML = `
<div style="
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(150px,1fr));
  gap:12px;
">
`;

// 🔹 IMAGE TAB
if(currentTab === "image"){

  (data.image || []).forEach(p => {

    output.innerHTML += `
    <div style="
      background:#fff;
      border-radius:10px;
      padding:6px;
      box-shadow:0 2px 6px rgba(0,0,0,0.1);
      text-align:center;
    ">
      <img src="${p.value}" style="
        width:100%;
        height:100px;
        object-fit:cover;
        border-radius:6px;
      ">
      <div style="font-size:10px; margin-top:5px;">
        ${new Date(p.ts).toLocaleString()}
      </div>
    </div>
    `;

  });

}

// 🔹 PDF TAB
if(currentTab === "pdf"){

  (data.pdf || []).forEach(p => {

    output.innerHTML += `
    <div style="
      background:#fff;
      border-radius:10px;
      padding:10px;
      text-align:center;
      box-shadow:0 2px 6px rgba(0,0,0,0.1);
    ">
      <div style="font-size:30px;">📄</div>

      <div style="font-size:12px; margin-top:5px;">
        PDF File
      </div>

      <a href="${p.value}" target="_blank" style="
        display:inline-block;
        margin-top:6px;
        color:#2563eb;
        font-size:12px;
      ">
        Open
      </a>

      <div style="font-size:10px; margin-top:6px;">
        ${new Date(p.ts).toLocaleString()}
      </div>
    </div>
    `;

  });

}

// ✅ EMPTY STATE (optional but good)
if(output.innerHTML.trim() === `
<div style="
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(150px,1fr));
  gap:12px;
">
`){
  output.innerHTML += "No files found";
}

// ✅ GRID CLOSE
output.innerHTML += `</div>`;

} catch(err){
console.error("❌ LOAD ERROR:", err);
}

}
function showGalleryTab(type){

  currentTab = type;

  // button UI
  document.getElementById("imgTab").style.background = type === "image" ? "#2563eb" : "#e5e7eb";
  document.getElementById("pdfTab").style.background = type === "pdf" ? "#2563eb" : "#e5e7eb";

  document.getElementById("imgTab").style.color = type === "image" ? "white" : "black";
  document.getElementById("pdfTab").style.color = type === "pdf" ? "white" : "black";

  loadImages(); // reload gallery
}
</script>

</body>
</html>
